<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星夜堂 ｜ 夜の星めぐり</title>
<style>
  :root{
    --sky:#1a2244; --ground:#3b4a6e; --crys1:#7fe3d4; --crys2:#c9a7ff;
    --lantern:#ffd47f; --line:#12142e; --ink:#e8ecff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0d1330;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    color:var(--ink);-webkit-tap-highlight-color:transparent;touch-action:none;}
  #app{position:fixed;inset:0;}
  canvas{display:block;}

  /* HUD */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
  #brand{position:absolute;top:env(safe-area-inset-top,0);left:0;right:0;
    padding:14px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;}
  #brand .title{font-size:clamp(13px,3.6vw,17px);letter-spacing:.28em;
    text-shadow:0 2px 12px rgba(0,0,0,.6);opacity:.9;}
  #brand .title small{display:block;letter-spacing:.14em;font-size:.62em;opacity:.6;margin-top:3px;}
  #progress{display:flex;gap:6px;align-items:center;background:rgba(18,20,46,.42);
    border:1px solid rgba(201,167,255,.28);border-radius:999px;padding:6px 12px;
    backdrop-filter:blur(4px);}
  #progress .star{width:12px;height:12px;border-radius:50%;
    background:rgba(255,212,127,.16);box-shadow:inset 0 0 0 1px rgba(255,212,127,.4);
    transition:.4s;}
  #progress .star.on{background:var(--lantern);
    box-shadow:0 0 10px 2px rgba(255,212,127,.8);}
  #progress .cnt{font-size:12px;letter-spacing:.1em;opacity:.85;margin-left:4px;}

  /* info card — PC:右スライドパネル / スマホ:ボトムシート（3D世界を隠さない） */
  #card{position:absolute;right:0;top:50%;width:300px;max-width:82vw;
    transform:translate(112%,-50%);padding:24px 22px 16px;text-align:center;
    background:
      radial-gradient(1.2px 1.2px at 18% 22%, rgba(255,255,255,.5), transparent 60%),
      radial-gradient(1px 1px at 72% 12%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(1px 1px at 40% 58%, rgba(255,255,255,.28), transparent 60%),
      radial-gradient(1.4px 1.4px at 86% 44%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1px 1px at 12% 80%, rgba(255,255,255,.3), transparent 60%),
      radial-gradient(1px 1px at 62% 90%, rgba(255,255,255,.22), transparent 60%),
      linear-gradient(168deg, rgba(31,38,74,.97) 0%, rgba(26,34,68,.97) 48%, rgba(18,20,46,.98) 100%);
    border:1px solid rgba(255,212,127,.5);border-radius:16px 0 0 16px;
    box-shadow:0 18px 50px rgba(0,0,0,.55), inset 0 0 26px rgba(127,227,212,.05);
    transition:transform .55s cubic-bezier(.22,.9,.3,1),opacity .4s;opacity:0;
    backdrop-filter:blur(6px);pointer-events:none;touch-action:pan-y;}
  #card::before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,212,127,.22);
    border-radius:12px 0 0 12px;pointer-events:none;}
  #card.show{opacity:1;transform:translate(0,-50%);pointer-events:auto;}
  #card .icon{font-size:30px;margin-bottom:8px;}
  #card .lbl{font-family:"Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif;
    font-size:15px;letter-spacing:.3em;color:var(--lantern);margin-bottom:2px;}
  #card .constel{width:88%;height:22px;margin:8px auto 10px;display:block;}
  #card .constel path{stroke-dasharray:100;stroke-dashoffset:100;}
  #card.show .constel path{animation:constelDraw .6s ease-out .15s forwards;}
  #card .constel circle{opacity:.2;}
  #card.show .constel circle{animation:starTwinkle 2.4s ease-in-out infinite alternate;}
  #card.show .constel circle:nth-of-type(2){animation-delay:.5s;}
  #card.show .constel circle:nth-of-type(3){animation-delay:.9s;}
  #card.show .constel circle:nth-of-type(4){animation-delay:.3s;}
  #card.show .constel circle:nth-of-type(5){animation-delay:1.2s;}
  #card.show .constel circle:nth-of-type(6){animation-delay:.7s;}
  @keyframes constelDraw{to{stroke-dashoffset:0;}}
  @keyframes starTwinkle{from{opacity:.2;}to{opacity:1;}}
  #card .msg{font-size:14px;line-height:1.9;letter-spacing:.04em;text-align:left;
    color:var(--ink);font-weight:500;}
  #card .go{display:block;margin-top:16px;padding:12px 0;border-radius:999px;text-align:center;
    border:1px solid rgba(255,212,127,.65);color:var(--lantern);text-decoration:none;
    font-size:13px;letter-spacing:.12em;background:rgba(255,212,127,.08);transition:.3s;}
  #card .go:hover{background:rgba(255,212,127,.18);box-shadow:0 0 18px rgba(255,212,127,.35);}
  #card .close{margin-top:12px;font-size:11px;letter-spacing:.24em;opacity:.6;cursor:pointer;}
  /* スマホ・狭い画面：ボトムシート（スティックと反対の右下） */
  @media (hover:none), (max-width:560px){
    #card{top:auto;left:auto;right:8px;bottom:calc(10px + env(safe-area-inset-bottom,0));
      width:min(76vw,340px);max-height:44vh;overflow-y:auto;
      transform:translate(0,135%);border-radius:16px;}
    #card::before{border-radius:12px;}
    #card.show{transform:translate(0,0);}
  }

  /* clear banner */
  #clear{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    text-align:center;opacity:0;transition:opacity 1.4s;pointer-events:none;padding:0 20px;}
  #clear.show{opacity:1;pointer-events:auto;}
  #clear .cta{display:inline-block;margin-top:22px;padding:14px 30px;border-radius:999px;
    border:1px solid rgba(127,227,212,.7);color:var(--crys1);text-decoration:none;
    font-size:clamp(13px,3.6vw,15px);letter-spacing:.1em;background:rgba(127,227,212,.08);
    box-shadow:0 0 22px rgba(127,227,212,.25);transition:.3s;}
  #clear .cta:hover{background:rgba(127,227,212,.18);box-shadow:0 0 30px rgba(127,227,212,.5);}
  #clear .cls{margin-top:18px;font-size:11px;letter-spacing:.2em;opacity:.6;cursor:pointer;}
  #clear .big{font-size:clamp(22px,6.4vw,34px);letter-spacing:.2em;
    text-shadow:0 0 24px rgba(201,167,255,.7);}
  #clear .sub{margin-top:14px;font-size:clamp(12px,3.4vw,15px);letter-spacing:.16em;opacity:.85;line-height:1.9;}
  #clear .sub b{color:var(--crys1);font-weight:400;}

  /* joystick */
  #stick{position:absolute;left:24px;bottom:calc(28px + env(safe-area-inset-bottom,0));
    width:120px;height:120px;border-radius:50%;pointer-events:auto;
    background:radial-gradient(circle,rgba(201,167,255,.08),rgba(18,20,46,.28));
    border:1px solid rgba(201,167,255,.22);display:none;touch-action:none;}
  #stick .knob{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;
    border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,212,127,.9),rgba(255,180,90,.5));
    box-shadow:0 0 18px rgba(255,212,127,.55);transition:transform .04s;}

  /* start / help overlay */
  #start{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
    align-items:center;gap:22px;background:radial-gradient(circle at 50% 40%,rgba(31,38,74,.5),rgba(10,14,38,.86));
    pointer-events:auto;text-align:center;padding:24px;transition:opacity .8s;}
  #start.hide{opacity:0;pointer-events:none;}
  #start h1{font-size:clamp(24px,7vw,40px);letter-spacing:.24em;font-weight:400;
    text-shadow:0 0 30px rgba(201,167,255,.6);}
  #start h1 small{display:block;font-size:.4em;letter-spacing:.4em;color:var(--crys1);
    margin-top:14px;opacity:.85;}
  #start p{font-size:clamp(12px,3.4vw,14px);line-height:2;opacity:.82;letter-spacing:.08em;max-width:340px;}
  #start .btn{margin-top:6px;padding:13px 34px;border-radius:999px;letter-spacing:.24em;font-size:14px;
    border:1px solid rgba(255,212,127,.6);color:var(--lantern);
    background:rgba(255,212,127,.06);cursor:pointer;transition:.3s;}
  #start .btn:hover{background:rgba(255,212,127,.16);box-shadow:0 0 24px rgba(255,212,127,.4);}
  #hint{position:absolute;bottom:calc(20px + env(safe-area-inset-bottom,0));left:0;right:0;
    text-align:center;font-size:11px;letter-spacing:.16em;opacity:.5;}
  @media (hover:none){ #hint .kbd{display:none;} }
  @media (hover:hover){ #hint .touch{display:none;} }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div id="brand">
    <div class="title">星 夜 堂<small>SEIYADO ｜ 夜の星めぐり</small></div>
    <div id="progress"><span class="cnt">☆ 0 / 7</span></div>
  </div>

  <div id="card">
    <div class="icon">✦</div>
    <div class="lbl">星 夜 堂 の 灯</div>
    <svg class="constel" viewBox="0 0 240 26" aria-hidden="true">
      <path d="M8,18 L52,8 L96,16 L132,6 L172,15 L232,10" fill="none" stroke="#ffd47f" stroke-width="1" pathLength="100"/>
      <g fill="#ffd47f">
        <circle cx="8" cy="18" r="1.6"/><circle cx="52" cy="8" r="2"/><circle cx="96" cy="16" r="1.4"/>
        <circle cx="132" cy="6" r="2"/><circle cx="172" cy="15" r="1.5"/><circle cx="232" cy="10" r="1.8"/>
      </g>
    </svg>
    <div class="msg">—</div>
    <a class="go" href="https://hoshiyorudou.com/" target="_blank" rel="noopener">くわしく見る →</a>
    <div class="close">と じ る</div>
  </div>

  <div id="clear">
    <div class="big">星 が 巡 っ た</div>
    <div class="sub">七つの光が空に道をひらいた。<br><b>星夜堂</b>は、あなたの夜にそっと灯りをともします。</div>
    <a class="cta" href="https://lin.ee/hoshiyorudou" target="_blank" rel="noopener">🌙 LINEで毎日の運勢を受け取る（無料）</a>
    <div class="cls">× とじて 星の散歩をつづける</div>
  </div>

  <div id="stick"><div class="knob"></div></div>

  <div id="hint">
    <span class="kbd">WASD / 矢印キー で 旅人をあるかせる</span>
    <span class="touch">左下のスティックを ドラッグ して あるく</span>
  </div>

  <div id="start">
    <h1>夜 の 星 め ぐ り<small>星 夜 堂</small></h1>
    <p>小さな星のうえを歩き、夜空にともる<br>七つの「星の灯」をめぐりましょう。<br>近づくたび、星夜堂の診断や占いの案内が受け取れます。</p>
    <div class="btn" id="startBtn">は じ め る</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   星夜堂 ｜ 夜の星めぐり  —  single-file Three.js demo
   球面重力歩行 / セルルック＋濃紺輪郭線 / 三人称追従カメラ
   ============================================================ */
(() => {
'use strict';
const TColor = THREE.Color;
const V3 = (x,y,z)=>new THREE.Vector3(x,y,z);

// ---- constants / tokens ----
const R = 15;                 // planet radius
const COL = {
  sky:0x1a2244, ground:0x3b4a6e, crys1:0x7fe3d4, crys2:0xc9a7ff,
  lantern:0xffd47f, line:0x12142e, rock:0x2c3860, path:0x263257
};
// 星夜堂（hoshiyorudou.com）のコンテンツ案内 — 7つの情報スポット
const SPOTS = [
  {icon:"🐱", label:"猫 種 診 断", desc:"全8タイプ・20問。アメショ、ベンガル、ラグドール、ペルシャほか。あなたにぴったりの猫種を診断します。", url:"https://hoshiyorudou.com/neko_v2.html"},
  {icon:"🐶", label:"犬 種 診 断", desc:"全16タイプ・20問。柴犬、ゴールデン、ハスキー、ポメラニアンほか。直感で選ぶだけ、約3分。", url:"https://hoshiyorudou.com/inu_v2.html"},
  {icon:"🦁", label:"動 物 診 断", desc:"全7タイプ・20問。獅子、狼、鷹、狐ほか。あなたの中に棲む動物はどれ？", url:"https://hoshiyorudou.com/dobutsu_v2.html"},
  {icon:"✨", label:"神 獣 診 断", desc:"全6タイプ・20問。白虎、青龍、鳳凰、麒麟ほか。あなたを守る神獣を診断します。", url:"https://hoshiyorudou.com/shinjuu_v2.html"},
  {icon:"🐉", label:"守 護 龍 診 断", desc:"全6タイプ・20問。金龍、炎龍、月龍、桜龍、嵐龍、大地龍。あなたの守護龍は？", url:"https://hoshiyorudou.com/shugoryu_v2.html"},
  {icon:"🔮", label:"6 つ の 占 術", desc:"四柱推命・算命学・紫微斗数・九星気学 × 西洋占星術・数秘術。東洋×西洋の全方位分析で運勢の精度を高めます。", url:"https://hoshiyorudou.com/uranai.html"},
  {icon:"🌙", label:"LINE で 毎 日 運 勢", desc:"性格診断×6つの占術×過去12年の運気周期を照合し、あなただけの運勢を毎日LINEでお届けします（無料）。", url:"https://lin.ee/hoshiyorudou"}
];

// ---- renderer / scene / camera ----
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1330, 1);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x141a3a, 0.010);   // 地平線用の薄い夜霧（空の遠景は fog:false で除外）

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, R+14, 26);

// ---- toon gradient (3-step, min band kept bright for 夜間視認性) ----
function gradientTex(){
  const d = new Uint8Array([120,120,120, 190,190,190, 255,255,255]);
  const t = new THREE.DataTexture(d, 3, 1, THREE.RGBFormat);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.needsUpdate = true; return t;
}
const GRAD = gradientTex();
function toon(color, emissive, eInt){
  const m = new THREE.MeshToonMaterial({color, gradientMap:GRAD});
  if(emissive!==undefined){ m.emissive = new TColor(emissive); m.emissiveIntensity = eInt||1; }
  return m;
}

// ---- inverted-hull outline (濃紺) ----
const outlineMat = new THREE.ShaderMaterial({
  uniforms:{ oColor:{value:new TColor(COL.line)}, thick:{value:0.06} },
  vertexShader:`uniform float thick; void main(){
    vec3 p = position + normalize(normal)*thick;
    gl_Position = projectionMatrix*modelViewMatrix*vec4(p,1.0);}`,
  fragmentShader:`uniform vec3 oColor; void main(){ gl_FragColor=vec4(oColor,1.0);}`,
  side:THREE.BackSide
});
function outline(mesh, thick){
  const m = outlineMat.clone(); m.uniforms.thick.value = thick||0.06;
  const o = new THREE.Mesh(mesh.geometry, m);
  o.renderOrder = -1; mesh.add(o); return o;
}
// build a toon mesh + outline in one shot
function cel(geo, color, thick, emissive, eInt){
  const mesh = new THREE.Mesh(geo, toon(color, emissive, eInt));
  outline(mesh, thick===undefined?0.05:thick);
  return mesh;
}

// ---- additive glow halo sprite (Bloomの代替) ----
const haloTex = (()=>{
  const s=128, c=document.createElement('canvas'); c.width=c.height=s;
  const g=c.getContext('2d'); const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(.25,'rgba(255,255,255,.7)');
  grd.addColorStop(.55,'rgba(255,255,255,.22)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grd; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); return t;
})();
let haloCount = 0;
function halo(color, size){
  haloCount++;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map:haloTex, color, blending:THREE.AdditiveBlending, transparent:true,
    depthWrite:false, opacity:.9, fog:false }));   // 加算合成はフォグ非適用
  sp.scale.setScalar(size||2);
  return sp;
}

// ============================================================
//  PLANET (static at origin) + terrain
// ============================================================
const planet = new THREE.Group(); scene.add(planet);
const obstacles = [];   // 簡易衝突判定用（方向ベクトル＋角度閾値cos）

const planetMesh = cel(new THREE.SphereGeometry(R, 48, 48), COL.ground, 0.18);
planet.add(planetMesh);

// place helper: put obj on sphere surface along dir (unit), raised by h
const UP = V3(0,1,0);
function placeOnSphere(obj, dir, h){
  dir = dir.clone().normalize();
  obj.position.copy(dir.clone().multiplyScalar(R + (h||0)));
  obj.quaternion.setFromUnitVectors(UP, dir);
  planet.add(obj);
  obj.userData.dir = dir;
  return obj;
}
function randDir(){
  const u=Math.random(), v=Math.random();
  const th=2*Math.PI*u, ph=Math.acos(2*v-1);
  return V3(Math.sin(ph)*Math.cos(th), Math.cos(ph), Math.sin(ph)*Math.sin(th));
}

// -- craters (shallow rims) --
for(let i=0;i<9;i++){
  const cr = new THREE.Group();
  const rim = cel(new THREE.TorusGeometry(1.1+Math.random()*0.8, 0.22, 8, 20), COL.rock, 0.04);
  rim.rotation.x = Math.PI/2; rim.position.y = 0.02;
  const floor = new THREE.Mesh(new THREE.CircleGeometry(1.2,20), toon(0x222c50));
  floor.rotation.x = -Math.PI/2; floor.position.y = -0.05;
  cr.add(rim); cr.add(floor);
  const s = 0.7+Math.random()*0.8; cr.scale.setScalar(s);
  placeOnSphere(cr, randDir(), 0);
}

// -- glowing crystal clusters --
const crystals = [];
function crystalCluster(dir){
  const g = new THREE.Group();
  const n = 3+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){
    const c = (Math.random()<0.5)?COL.crys1:COL.crys2;
    const h = 0.9+Math.random()*1.6;
    const cr = cel(new THREE.ConeGeometry(0.28+Math.random()*0.18, h, 5), c, 0.04, c, 0.9);
    cr.position.set((Math.random()-.5)*0.9, h/2, (Math.random()-.5)*0.9);
    cr.rotation.z = (Math.random()-.5)*0.5; cr.rotation.x=(Math.random()-.5)*0.4;
    g.add(cr);
    if(haloCount<8){ const hl=halo(c,1.5); hl.position.copy(cr.position); hl.position.y=h*0.7; g.add(hl); }
  }
  placeOnSphere(g, dir, 0);
  crystals.push(g);
  obstacles.push({dir:dir.clone().normalize(), cos:Math.cos(0.085)});
}
for(let i=0;i<7;i++) crystalCluster(randDir());

// -- cobblestone path (arc of stones between two points) --
(function path(){
  const a = V3(0,1,0.15).normalize(), b = V3(0.9,0.2,-0.4).normalize();
  const steps=26;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const d = a.clone().multiplyScalar(1-t).add(b.clone().multiplyScalar(t)).normalize();
    const st = cel(new THREE.CylinderGeometry(0.34,0.34,0.16,6), COL.path, 0.03);
    st.rotation.y = Math.random()*Math.PI;
    placeOnSphere(st, d, 0.02);
    st.scale.set(1+Math.random()*.3,1,1+Math.random()*.3);
  }
})();

// -- observatory (小さな天文台) --
let telescope, telescopeGlow, observatoryDir = V3(0.25,0.9,0.3).normalize();
(function observatory(){
  const g = new THREE.Group();
  const base = cel(new THREE.CylinderGeometry(1.5,1.8,1.1,16), 0x39456e, 0.05);
  base.position.y=0.55; g.add(base);
  const dome = cel(new THREE.SphereGeometry(1.5,18,12,0,Math.PI*2,0,Math.PI/2), 0x4a5688, 0.05);
  dome.position.y=1.1; g.add(dome);
  const slit = new THREE.Mesh(new THREE.BoxGeometry(0.4,1.5,1.6), toon(0x161d3d));
  slit.position.set(0,1.5,0); g.add(slit);
  // telescope
  telescope = new THREE.Group();
  const tube = cel(new THREE.CylinderGeometry(0.18,0.24,1.9,12), 0x9fb0e0, 0.03, COL.lantern, 0.0);
  tube.rotation.z = Math.PI/2.6; tube.position.y=1.4;
  telescope.add(tube);
  telescopeGlow = halo(COL.lantern, 0); telescopeGlow.position.set(0.7,2.1,0);
  telescope.add(telescopeGlow);
  telescope.userData.tube = tube;
  g.add(telescope);
  placeOnSphere(g, observatoryDir, 0);
  obstacles.push({dir:observatoryDir.clone(), cos:Math.cos(0.16)});
})();

// ============================================================
//  STAR SHARDS (collectibles ×7)
// ============================================================
const shards = []; let collected = 0;
function emojiSprite(txt){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const g=c.getContext('2d'); g.font='92px serif'; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(txt,64,72);

(function landmarks(){

  const axis=V3(0.35,1,0.25).normalize();
  const u=V3(1,0,0).cross(axis).normalize();
  const v=axis.clone().cross(u).normalize();
  const ringDir=t=>u.clone().multiplyScalar(Math.cos(t)).add(v.clone().multiplyScalar(Math.sin(t))).normalize();
  const ringTan=t=>axis.clone().cross(ringDir(t)).normalize();
  const steps=48;
  for(let i=0;i<steps;i++){
    const st=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.14,6), toon(COL.path));

const keys={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// virtual stick
let stickVec={x:0,y:0}, stickActive=false;
const stickEl=document.getElementById('stick'), knob=stickEl.querySelector('.knob');
function stickStart(e){stickActive=true; stickMove(e);}
function stickMove(e){
  if(!stickActive)return;
  const t=e.touches?e.touches[0]:e; const r=stickEl.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const max=r.width/2, len=Math.hypot(dx,dy);
  if(len>max){dx*=max/len;dy*=max/len;}
  knob.style.transform=`translate(${dx}px,${dy}px)`;
  stickVec.x=dx/max; stickVec.y=dy/max;
}
function stickEnd(){stickActive=false; stickVec={x:0,y:0}; knob.style.transform='translate(0,0)';}
stickEl.addEventListener('touchstart',stickStart,{passive:true});
stickEl.addEventListener('touchmove',stickMove,{passive:true});
stickEl.addEventListener('touchend',stickEnd);
stickEl.addEventListener('mousedown',stickStart);
addEventListener('mousemove',stickMove); addEventListener('mouseup',stickEnd);

const MOVE=1.15, TURN=1.6;  // rad/sec
const camUp=V3(0,1,0), lookAt=V3(0,R,0);
let walkPhase=0, started=false;
// --- reusable scratch (毎フレームのGC割り当てを避ける) ---
const AX_X=V3(1,0,0), AX_Y=V3(0,1,0);
const _q=new THREE.Quaternion(), _qSave=new THREE.Quaternion();
const _cp=new THREE.Vector3(), _up=new THREE.Vector3(), _fw=new THREE.Vector3();
const _desired=new THREE.Vector3(), _look=new THREE.Vector3(), _sv=new THREE.Vector3();
const _dir=new THREE.Vector3(), _ft=new THREE.Vector3();
let camFocus=null, camFocusK=0;   // カード表示中にカメラを灯へ寄せる

function update(dt){
  // input → forward / turn
  let fwd=0, turn=0;
  if(keys['w']||keys['arrowup']) fwd+=1;
  if(keys['s']||keys['arrowdown']) fwd-=1;
  if(keys['a']||keys['arrowleft']) turn+=1;
  if(keys['d']||keys['arrowright']) turn-=1;
  if(Math.abs(stickVec.x)>0.05||Math.abs(stickVec.y)>0.05){
    fwd += -stickVec.y; turn += -stickVec.x;
  }
  fwd=Math.max(-1,Math.min(1,fwd)); turn=Math.max(-1,Math.min(1,turn));

  const moving=Math.abs(fwd)>0.02;
  // turn about local up (Y), move about local right (X)
  if(turn!==0){
    _q.setFromAxisAngle(AX_Y, turn*TURN*dt);
    pivot.quaternion.multiply(_q);
  }
  if(fwd!==0){
    _qSave.copy(pivot.quaternion);
    _q.setFromAxisAngle(AX_X, -fwd*MOVE*dt);
    pivot.quaternion.multiply(_q);
    // 簡易衝突：進行後のキャラ方向が障害物の角度閾値内なら前進を取り消す（旋回は許可）
    _dir.set(0,1,0).applyQuaternion(pivot.quaternion);
    for(let i=0;i<obstacles.length;i++){
      if(_dir.dot(obstacles[i].dir) > obstacles[i].cos){ pivot.quaternion.copy(_qSave); break; }
    }
  }

  // walk animation
  if(moving){
    walkPhase += dt*9;
    legs[0].rotation.x=Math.sin(walkPhase)*0.5;
    legs[1].rotation.x=-Math.sin(walkPhase)*0.5;
    traveler.position.y = R + Math.abs(Math.sin(walkPhase))*0.06;
    if(traveler.userData.tail) traveler.userData.tail.rotation.z=Math.sin(walkPhase)*0.35;
  } else {
    const damp = Math.pow(0.85, dt*60);   // フレームレート非依存の減衰
    walkPhase*=damp;
    legs[0].rotation.x*=damp; legs[1].rotation.x*=damp;
    traveler.position.y = R;
    if(traveler.userData.tail) traveler.userData.tail.rotation.z*=damp;
  }

  // ---- camera : lerp position / up / look ----
  traveler.getWorldPosition(_cp);
  _up.copy(_cp).normalize();
  _fw.set(0,0,-1).applyQuaternion(pivot.quaternion).normalize();
  _desired.copy(_cp).addScaledVector(_fw,-9).addScaledVector(_up,5.2);
  // カード表示中：ランプ方向へ13%ゆっくり寄る（閉じるとlerpで戻る）
  camFocusK += ((camFocus?1:0)-camFocusK)*(1-Math.pow(0.02,dt));
  if(camFocus) camFocus.getWorldPosition(_ft);
  if(camFocusK>0.002) _desired.lerp(_ft, 0.13*camFocusK);
  camera.position.lerp(_desired, 1-Math.pow(0.001,dt));
  camUp.lerp(_up, 1-Math.pow(0.0005,dt)).normalize(); camera.up.copy(camUp);
  _look.copy(_cp).addScaledVector(_up,1.6);
  if(camFocusK>0.002) _look.lerp(_ft, 0.2*camFocusK);
  lookAt.lerp(_look, 1-Math.pow(0.0008,dt));
  camera.lookAt(lookAt);

  // ---- shards : bob / spin / visit ----  (_cp = traveler world pos)
  shards.forEach(s=>{
    s.userData.phase+=dt*2;
    const bob=Math.sin(s.userData.phase)*0.25;
    s.position.copy(_sv.copy(s.userData.baseDir).multiplyScalar(R+2.2+bob));
    s.userData.core.rotation.y+=dt*1.5; s.userData.core.rotation.x+=dt*0.8;
    // 近接でカード表示（離れて再接近すれば何度でも表示：ヒステリシス付き）
    const d=s.position.distanceTo(_cp);
    if(d<2.6){ if(!s.userData.inRange){ s.userData.inRange=true; visit(s); } }
    else if(d>3.8){ s.userData.inRange=false; }
  });

  // crystals gentle pulse
  const pulse=0.7+Math.sin(performance.now()*0.001)*0.25;
  crystals.forEach(g=>g.children.forEach(ch=>{ if(ch.material&&ch.material.emissiveIntensity!==undefined) ch.material.emissiveIntensity=pulse; }));

  // lantern flicker
  const lp=traveler.userData.lp;
  lp.intensity = 1.6 + Math.sin(performance.now()*0.006)*0.18 + Math.random()*0.05;
  traveler.userData.lanternHalo.scale.setScalar(2.5+Math.sin(performance.now()*0.005)*0.15);

  // 旗のはためき
  for(let i=0;i<flagsAnim.length;i++) flagsAnim[i].rotation.x=Math.sin(performance.now()*0.002+i*1.7)*0.12;

  // shooting stars
  nextShoot-=dt; if(nextShoot<=0){ spawnShooter(); nextShoot=3+Math.random()*4; }
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i]; s.userData.life+=dt;
    s.position.addScaledVector(s.userData.dir, s.userData.speed*dt);
    const l=s.userData.life/s.userData.max;
    s.material.opacity=Math.sin(Math.min(l,1)*Math.PI)*0.9;
    s.scale.set(8,1.4,1);
    if(l>=1){ scene.remove(s); shooters.splice(i,1); }
  }

  // clear sequence anim
  if(clearing){
    clearT+=dt;
    telescopeGlow.scale.setScalar(Math.min(clearT*3,6));
    telescope.userData.tube.material.emissiveIntensity=Math.min(clearT*1.2,1.4);
    if(constellation){
      constellation.material.opacity=Math.min(clearT*0.4,0.9);
      constellation.children.forEach(h=>{ if(h.userData.node) h.material.opacity=Math.min(clearT*0.4,0.85); });
    }
  }
}

// ============================================================
//  COLLECT + FORTUNE CARD + CLEAR
// ============================================================
const cardEl=document.getElementById('card'), msgEl=cardEl.querySelector('.msg');
const progEl=document.getElementById('progress');
let cardTimer=null;
function refreshProgress(){
  let html='';
  for(let i=0;i<7;i++) html+=`<span class="star${i<collected?' on':''}"></span>`;
  html+=`<span class="cnt">☆ ${collected} / 7</span>`;
  progEl.innerHTML=html;
}
refreshProgress();

const lblEl=cardEl.querySelector('.lbl'), iconEl=cardEl.querySelector('.icon'), goEl=cardEl.querySelector('.go');
cardEl.querySelector('.close').addEventListener('click',()=>{cardEl.classList.remove('show'); camFocus=null;});
document.querySelector('#clear .cls').addEventListener('click',()=>document.getElementById('clear').classList.remove('show'));
function showSpot(spot){
  iconEl.textContent=spot.icon; lblEl.textContent=spot.label;
  msgEl.textContent=spot.desc; goEl.href=spot.url;
  cardEl.classList.add('show');
  clearTimeout(cardTimer);
  cardTimer=setTimeout(()=>{cardEl.classList.remove('show'); camFocus=null;}, 15000);
}

let clearing=false, clearT=0;
// 訪問：スポットは消えず、何度でも近づいてカードを見られる
function visit(s){
  camFocus=s;   // カメラをこの灯へゆっくり寄せる
  showSpot(s.userData.spot);
  if(!s.userData.visited){
    s.userData.visited=true;
    collected++; refreshProgress();
    // 訪問済みの目印：灯を金色→青緑に変える
    s.userData.core.material.color.set(COL.crys1);
    s.userData.core.material.emissive.set(COL.crys1);
    if(s.userData.halo) s.userData.halo.material.color.set(COL.crys1);
    if(collected>=7) triggerClear();
  }
}
function triggerClear(){
  setTimeout(()=>{
    cardEl.classList.remove('show'); camFocus=null;   // 最後の情報カードを閉じてクリア演出と重ねない
    buildConstellation(); clearing=true; clearT=0;
    document.getElementById('clear').classList.add('show');
  }, 3200);
}

// ============================================================
//  LOOP / RESIZE / START
// ============================================================
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  if(started) update(dt);
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// start
const startEl=document.getElementById('start');
function begin(){
  if(started)return; started=true;
  startEl.classList.add('hide');
  // show stick on touch devices
  if(matchMedia('(hover:none)').matches) stickEl.style.display='block';
}
document.getElementById('startBtn').addEventListener('click',begin);
startEl.addEventListener('touchstart',begin,{passive:true});

// expose for debug
window.__seiya={scene,camera,pivot,shards,visit,collect:()=>shards.forEach(s=>visit(s))};
})();
</script>
